<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Explorer — PokéAPI Explorer</title>
<link rel="stylesheet" href="shared.css">
<style>
.toolbar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
.toolbar .input-wrap { flex:1; min-width:220px; max-width:340px; }
.poke-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:12px; }

/* Detail panel content */
.dp-hero {
  background: linear-gradient(135deg,#1a1a2e,#16213e);
  padding: 28px 28px 20px;
  display: flex; flex-direction:column; align-items:center; gap:8px;
}
.dp-artwork { width:168px; height:168px; image-rendering:pixelated; }
.dp-name { font-size:1.6rem; font-weight:900; color:#fff; text-transform:capitalize; }
.dp-num  { font-size:0.82rem; color:rgba(255,255,255,0.45); margin-bottom:4px; }
.dp-body { padding:24px 24px 36px; }
.dp-section { margin-top:22px; }
.dp-section-title { font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:10px; }
.dp-meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.dp-meta-item { background:var(--bg); border-radius:var(--r-sm); padding:10px 14px; }
.dp-meta-label { font-size:0.68rem; color:var(--text-muted); font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px; }
.dp-meta-val   { font-size:0.92rem; font-weight:700; text-transform:capitalize; }
.ability-row { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:var(--bg); border-radius:var(--r-sm); margin-bottom:6px; }
.ability-name { font-weight:700; font-size:0.88rem; text-transform:capitalize; }
.ability-hidden { font-size:0.68rem; color:var(--text-muted); background:var(--border); padding:2px 7px; border-radius:var(--r-full); }
.move-learn-item { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--border); font-size:0.84rem; }
.move-learn-item:last-child { border-bottom:none; }
.move-level { min-width:32px; font-size:0.72rem; font-weight:800; color:var(--text-muted); }
.move-learn-name { text-transform:capitalize; font-weight:600; flex:1; }

.api-call-box { background:var(--code-bg); border-radius:var(--r-sm); padding:10px 14px; font-family:monospace; font-size:0.74rem; color:#94e2d5; margin-top:14px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

.gen-filter { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.gen-pill { padding:4px 10px; border-radius:var(--r-full); font-size:0.74rem; font-weight:700; cursor:pointer; border:1.5px solid var(--border-medium); color:var(--text-light); background:var(--card-bg); transition:var(--t); }
.gen-pill:hover { border-color:var(--text-muted); }
.gen-pill.on { background:var(--red); color:#fff; border-color:transparent; }

.pager { display:flex; align-items:center; gap:8px; margin-top:20px; justify-content:center; }
</style>
</head>
<body>
<aside id="sidebar"></aside>
<main id="main">
<div class="page">

  <div class="page-header">
    <h1>⚡ Pokémon Explorer</h1>
    <p>Browse, search, and inspect any of the 1,025+ Pokémon via the <code style="font-size:0.9em;background:var(--bg);padding:2px 6px;border-radius:4px">/api/v2/pokemon</code> and <code style="font-size:0.9em;background:var(--bg);padding:2px 6px;border-radius:4px">/api/v2/pokemon-species</code> endpoints.</p>
  </div>

  <div class="card">
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="input-wrap" style="flex:1;min-width:220px;max-width:360px">
        <span class="input-icon">🔎</span>
        <input id="search" class="input" placeholder="Search by name or #…" autocomplete="off">
      </div>
      <select id="gen-select" class="select">
        <option value="0">All Generations</option>
        <option value="1">Gen I (1–151)</option>
        <option value="2">Gen II (152–251)</option>
        <option value="3">Gen III (252–386)</option>
        <option value="4">Gen IV (387–493)</option>
        <option value="5">Gen V (494–649)</option>
        <option value="6">Gen VI (650–721)</option>
        <option value="7">Gen VII (722–809)</option>
        <option value="8">Gen VIII (810–905)</option>
        <option value="9">Gen IX (906–1025)</option>
      </select>
      <select id="type-select" class="select">
        <option value="">All Types</option>
        <option value="normal">Normal</option><option value="fire">Fire</option>
        <option value="water">Water</option><option value="electric">Electric</option>
        <option value="grass">Grass</option><option value="ice">Ice</option>
        <option value="fighting">Fighting</option><option value="poison">Poison</option>
        <option value="ground">Ground</option><option value="flying">Flying</option>
        <option value="psychic">Psychic</option><option value="bug">Bug</option>
        <option value="rock">Rock</option><option value="ghost">Ghost</option>
        <option value="dragon">Dragon</option><option value="dark">Dark</option>
        <option value="steel">Steel</option><option value="fairy">Fairy</option>
      </select>
    </div>

    <!-- Type filter pills -->
    <div id="type-filter-row" class="pill-row" style="margin-bottom:16px"></div>

    <!-- API info -->
    <div class="alert alert-info" style="margin-bottom:16px;font-size:0.82rem">
      <span>🔗</span>
      <span id="api-info">Loading Pokémon list from <strong>GET /api/v2/pokemon?limit=20&offset=0</strong></span>
    </div>

    <!-- Grid -->
    <div id="poke-grid" class="poke-grid stagger">
      <div class="loading-center" style="grid-column:1/-1"><div class="spinner"></div><span>Loading Pokémon…</span></div>
    </div>

    <!-- Pager -->
    <div class="pager" id="pager"></div>
  </div>

</div><!-- .page -->
</main>

<!-- Detail Panel -->
<div class="overlay" id="overlay"></div>
<div class="detail-panel" id="detail-panel">
  <div id="detail-content"></div>
</div>

<script src="shared.js"></script>
<script>
buildSidebar('pokemon');

/* === STATE === */
let allPokemon = [];   // full list (name,url) from API
let filtered   = [];   // after search/type/gen filter
let page = 0;
const PAGE_SIZE = 24;
let activeType = '';
let activeGen  = 0;
let searchQ    = '';
let typeByNameCache = {};  // name -> type[]

const GEN_RANGES = [[1,151],[152,251],[252,386],[387,493],[494,649],[650,721],[722,809],[810,905],[906,1025]];

/* === LOAD ALL POKEMON LIST === */
async function loadAll() {
  const data = await apiFetch('/pokemon?limit=1302&offset=0');
  allPokemon = data.results;
  document.getElementById('api-info').innerHTML =
    `Loaded <strong>${data.count.toLocaleString()} Pokémon</strong> from <strong>GET /api/v2/pokemon?limit=1302</strong>`;
  applyFilters();
}

/* === FILTER LOGIC === */
function pokemonId(url) { return parseInt(url.split('/').filter(Boolean).pop()); }

function matchesGen(url) {
  if (!activeGen) return true;
  const id = pokemonId(url);
  const r = GEN_RANGES[activeGen-1];
  return id >= r[0] && id <= r[1];
}

function applyFilters() {
  filtered = allPokemon.filter(p => {
    const id = pokemonId(p.url);
    if (searchQ && !p.name.includes(searchQ) && !String(id).startsWith(searchQ)) return false;
    if (activeGen && !matchesGen(p.url)) return false;
    return true;
  });
  page = 0;
  renderGrid();
}

/* === RENDER GRID === */
async function renderGrid() {
  const grid = document.getElementById('poke-grid');
  const pager = document.getElementById('pager');

  // Filter by type requires fetching — show first page then filter by type if needed
  let list = filtered;

  // Pagination
  const start = page * PAGE_SIZE;
  const slice = list.slice(start, start + PAGE_SIZE);
  const totalPages = Math.ceil(list.length / PAGE_SIZE);

  grid.innerHTML = slice.map(p => {
    const id = pokemonId(p.url);
    return `<div class="poke-card stagger" data-name="${p.name}" data-id="${id}" onclick="openDetail('${p.name}',${id})">
      <div class="poke-num">#${padId(id)}</div>
      <img src="${spriteUrl(id)}" alt="${p.name}" loading="lazy" onerror="this.style.opacity='0.2'">
      <div class="poke-name">${cap(p.name)}</div>
      <div id="types-${id}"><div class="skeleton" style="height:20px;width:60px;margin:0 auto;border-radius:99px"></div></div>
    </div>`;
  }).join('') || emptyHTML('No Pokémon match those filters.');

  // Load types lazily
  slice.forEach(p => {
    const id = pokemonId(p.url);
    loadTypes(p.name, id);
  });

  // Pager
  if (totalPages > 1) {
    pager.innerHTML = `
      <button class="btn btn-secondary btn-sm" onclick="changePage(-1)" ${page===0?'disabled':''}>← Prev</button>
      <span style="font-size:0.85rem;color:var(--text-light)">Page ${page+1} of ${totalPages} <span style="color:var(--text-muted)">(${list.length.toLocaleString()} results)</span></span>
      <button class="btn btn-secondary btn-sm" onclick="changePage(1)" ${page>=totalPages-1?'disabled':''}>Next →</button>`;
  } else {
    pager.innerHTML = `<span style="font-size:0.82rem;color:var(--text-muted)">${list.length.toLocaleString()} Pokémon</span>`;
  }
}

async function loadTypes(name, id) {
  const el = document.getElementById(`types-${id}`);
  if (!el) return;
  // check type filter — skip if already cached and doesn't match
  try {
    const poke = await apiFetch(`/pokemon/${id}`);
    const types = poke.types.map(t=>t.type.name);

    // Apply type filter
    if (activeType && !types.includes(activeType)) {
      const card = document.querySelector(`[data-id="${id}"]`);
      if (card) card.style.display = 'none';
    }

    if (el) el.innerHTML = typeBadges(poke.types);
  } catch(e) {
    if (el) el.innerHTML = '';
  }
}

function changePage(delta) {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  page = Math.max(0, Math.min(page + delta, total - 1));
  renderGrid();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* === DETAIL PANEL === */
async function openDetail(name, id) {
  const panel = document.getElementById('detail-panel');
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('detail-content');
  panel.classList.add('open');
  overlay.classList.add('on');
  content.innerHTML = loadingHTML(`Loading ${cap(name)}…`);

  try {
    const [poke, species] = await Promise.all([
      apiFetch(`/pokemon/${name}`),
      apiFetch(`/pokemon-species/${name}`).catch(()=>null)
    ]);

    const types = poke.types.map(t=>t.type.name);
    const bgColor = TYPE_COLORS[types[0]] || '#1a1a2e';
    const ft = species ? flavorText(species) : '';
    const genus = species?.genera?.find(g=>g.language.name==='en')?.genus || '';

    // Level-up moves
    const lvlMoves = poke.moves
      .filter(m => m.version_group_details.some(v=>v.move_learn_method.name==='level-up'))
      .map(m => {
        const lvl = m.version_group_details.filter(v=>v.move_learn_method.name==='level-up').reduce((a,b)=>a.level_learned_at<b.level_learned_at?a:b,{level_learned_at:999}).level_learned_at;
        return { name: m.move.name, level: lvl };
      })
      .sort((a,b)=>a.level-b.level)
      .slice(0,30);

    const tmMoves = poke.moves
      .filter(m => m.version_group_details.some(v=>v.move_learn_method.name==='machine'))
      .map(m => ({ name: m.move.name }))
      .slice(0,30);

    const eggMoves = poke.moves
      .filter(m => m.version_group_details.some(v=>v.move_learn_method.name==='egg'))
      .map(m => ({ name: m.move.name }));

    content.innerHTML = `
      <div class="dp-hero" style="background:linear-gradient(135deg,${bgColor}dd,#1a1a2e)">
        <div style="display:flex;justify-content:space-between;width:100%;padding:0 0 4px">
          <button class="detail-close" onclick="closeDetail()">✕</button>
          <span style="font-size:0.75rem;color:rgba(255,255,255,0.4);font-weight:700">#${padId(poke.id)}</span>
        </div>
        <img class="dp-artwork" src="${artworkUrl(poke.id)}" alt="${poke.name}" onerror="this.src='${spriteUrl(poke.id)}'">
        <div class="dp-name">${cap(poke.name)}</div>
        ${genus ? `<div style="font-size:0.8rem;color:rgba(255,255,255,0.45);margin-bottom:2px">${genus}</div>` : ''}
        <div style="margin-top:6px">${typeBadges(poke.types)}</div>
      </div>
      <div class="dp-body">
        ${ft ? `<p style="font-size:0.86rem;color:var(--text-light);font-style:italic;line-height:1.65;margin-bottom:16px">"${ft}"</p>` : ''}

        <div class="dp-section">
          <div class="dp-section-title">Physical Info</div>
          <div class="dp-meta-grid">
            <div class="dp-meta-item"><div class="dp-meta-label">Height</div><div class="dp-meta-val">${fmtHeight(poke.height)}</div></div>
            <div class="dp-meta-item"><div class="dp-meta-label">Weight</div><div class="dp-meta-val">${fmtWeight(poke.weight)}</div></div>
            <div class="dp-meta-item"><div class="dp-meta-label">Base XP</div><div class="dp-meta-val">${poke.base_experience||'—'}</div></div>
            <div class="dp-meta-item"><div class="dp-meta-label">Base Total</div><div class="dp-meta-val" style="color:var(--red)">${poke.stats.reduce((s,st)=>s+st.base_stat,0)}</div></div>
          </div>
        </div>

        <div class="dp-section">
          <div class="dp-section-title">Base Stats</div>
          ${renderStats(poke.stats)}
        </div>

        <div class="dp-section">
          <div class="dp-section-title">Abilities</div>
          ${poke.abilities.map(a=>`
            <div class="ability-row">
              <a href="#" class="ability-name" onclick="loadAbilityDesc('${a.ability.name}',event)">${cap(a.ability.name)}</a>
              ${a.is_hidden?'<span class="ability-hidden">Hidden</span>':''}
            </div>`).join('')}
          <div id="ability-desc-box"></div>
        </div>

        <div class="dp-section">
          <div class="dp-section-title">Moves</div>
          <div class="tabs">
            <button class="tab-btn active" data-tab="lvl">Level-up (${lvlMoves.length})</button>
            <button class="tab-btn" data-tab="tm">TM/HM (${tmMoves.length})</button>
            <button class="tab-btn" data-tab="egg">Egg (${eggMoves.length})</button>
          </div>
          <div class="tab-panel active" data-panel="lvl">
            ${lvlMoves.length ? lvlMoves.map(m=>`
              <div class="move-learn-item">
                <span class="move-level">Lv ${m.level||'—'}</span>
                <a href="moves.html?q=${m.name}" class="move-learn-name">${cap(m.name)}</a>
              </div>`).join('') : '<div style="color:var(--text-muted);font-size:0.85rem;padding:12px 0">None via level-up</div>'}
          </div>
          <div class="tab-panel" data-panel="tm">
            ${tmMoves.length ? tmMoves.map(m=>`
              <div class="move-learn-item">
                <a href="moves.html?q=${m.name}" class="move-learn-name">${cap(m.name)}</a>
              </div>`).join('') : '<div style="color:var(--text-muted);font-size:0.85rem;padding:12px 0">None via TM/HM</div>'}
          </div>
          <div class="tab-panel" data-panel="egg">
            ${eggMoves.length ? eggMoves.map(m=>`
              <div class="move-learn-item">
                <a href="moves.html?q=${m.name}" class="move-learn-name">${cap(m.name)}</a>
              </div>`).join('') : '<div style="color:var(--text-muted);font-size:0.85rem;padding:12px 0">No egg moves</div>'}
          </div>
        </div>

        <div class="dp-section">
          <div class="dp-section-title">Evolution Chain</div>
          <div id="dp-evo">${loadingHTML('Loading chain…')}</div>
        </div>

        <div class="dp-section">
          <div class="dp-section-title">Sprites</div>
          <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
            ${[
              [poke.sprites.front_default,'Front'],
              [poke.sprites.back_default,'Back'],
              [poke.sprites.front_shiny,'Shiny Front'],
              [poke.sprites.back_shiny,'Shiny Back'],
            ].filter(([s])=>s).map(([s,l])=>`
              <div style="text-align:center">
                <img src="${s}" style="width:64px;height:64px;image-rendering:pixelated;background:var(--bg);border-radius:var(--r-sm);padding:4px">
                <div style="font-size:0.68rem;color:var(--text-muted);margin-top:2px">${l}</div>
              </div>`).join('')}
          </div>
        </div>

        <div class="api-call-box">
          <span>🔗</span>
          <span>GET /api/v2/pokemon/${name}</span>
          <a href="locations.html?q=${name}" style="margin-left:auto;font-size:0.76rem;color:var(--yellow)">Find in wild →</a>
        </div>
      </div>`;

    initTabs(content);

    // Load evolution chain
    if (species?.evolution_chain) {
      loadEvoChain(species.evolution_chain.url, content);
    }

  } catch(e) {
    content.innerHTML = errorHTML('Failed to load Pokémon data.');
  }
}

async function loadEvoChain(url, root) {
  try {
    const chain = await apiFetch(url);
    const evoEl = root.querySelector('#dp-evo');
    if (evoEl) {
      evoEl.innerHTML = `<div class="evo-chain">${renderEvoNode(chain.chain)}</div>`;
    }
  } catch(e) {}
}

async function loadAbilityDesc(name, e) {
  e.preventDefault();
  const box = document.getElementById('ability-desc-box');
  box.innerHTML = loadingHTML();
  try {
    const data = await apiFetch(`/ability/${name}`);
    const effect = data.effect_entries?.find(e=>e.language.name==='en');
    const short   = data.effect_entries?.find(e=>e.language.name==='en');
    box.innerHTML = `<div class="alert alert-info mt-8" style="font-size:0.82rem">
      <span>💡</span>
      <span>${effect?.short_effect || short?.effect || 'No description available.'}</span>
    </div>`;
  } catch(e) {
    box.innerHTML = '';
  }
}

function goToPokemon(name) { openDetail(name, urlId(`https://pokeapi.co/api/v2/pokemon-species/${name}/`)); }

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
}

document.getElementById('overlay').addEventListener('click', closeDetail);

/* === FILTER EVENTS === */
document.getElementById('search').addEventListener('input', debounce(e => {
  searchQ = e.target.value.trim().toLowerCase().replace(/\s+/g,'-');
  applyFilters();
}, 300));

document.getElementById('gen-select').addEventListener('change', e => {
  activeGen = parseInt(e.target.value);
  applyFilters();
});

document.getElementById('type-select').addEventListener('change', e => {
  activeType = e.target.value;
  applyFilters();
});

/* Check query string */
const qs = new URLSearchParams(location.search);
if (qs.get('q')) {
  searchQ = qs.get('q').toLowerCase();
  document.getElementById('search').value = searchQ;
}

loadAll();
</script>
</body>
</html>
